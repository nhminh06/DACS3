<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý Tour - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 15px;
            background: #26263b;
            border-radius: 8px;
        }
        .pagination-info {
            color: #ccc;
            font-size: 14px;
        }
        .pagination .page-link {
            background: #1e1e2f;
            border-color: #3f3f5f;
            color: #fff;
            padding: 8px 16px;
        }
        .pagination .page-item.active .page-link {
            background: #667eea;
            border-color: #667eea;
        }
        .pagination .page-item.disabled .page-link {
            background: #161625;
            border-color: #2f2f45;
            color: #666;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('tours')}"></div>

    <div class="main">
        <header class="header">
            <h1 class="h4 mb-0">Quản lý Tour</h1>
            <div class="user-info">
                Xin chào <strong>Admin</strong>
            </div>
        </header>

        <div class="stats-cards">
            <div class="stat-card">
                <h3 th:text="${total}">0</h3>
                <p>Tổng số tour</p>
            </div>
            <div class="stat-card">
                <h3 th:text="${activeCount}">0</h3>
                <p>Đang hiển thị</p>
            </div>
            <div class="stat-card">
                <h3 th:text="${hiddenCount}">0</h3>
                <p>Đang ẩn</p>
            </div>
            <div class="stat-card">
                <h3 th:text="${#numbers.formatDecimal(avgPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</h3>
                <p>Giá trung bình</p>
            </div>
        </div>

        <div class="section-header">
            <div class="section-title">Danh sách tour</div>
            <a href="/admin/tours/add" class="btn btn-add"><i class="bi bi-plus-circle me-2"></i>Thêm tour mới</a>
        </div>

        <div class="controls">
            <form action="/admin/tours" method="GET" class="search-container">
                <input type="text" name="search" placeholder="Tìm kiếm tour..." th:value="${search}">
                <button type="submit" class="btn-search"><i class="bi bi-search"></i></button>
            </form>
            <form action="/admin/tours" method="GET">
                <select name="sort" onchange="this.form.submit()" class="sort-select">
                    <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
                    <option value="name" th:selected="${sort == 'name'}">Tên A-Z</option>
                    <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng dần</option>
                    <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm dần</option>
                </select>
            </form>
        </div>

        <div class="table-container shadow-sm">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th style="width: 100px;">HÌNH ẢNH</th>
                        <th>TÊN TOUR</th>
                        <th style="width: 150px;">SỐ NGÀY</th>
                        <th style="width: 150px;">GIÁ</th>
                        <th style="width: 150px;">TRẠNG THÁI</th>
                        <th style="width: 150px;" class="text-end">THAO TÁC</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tour, iterStat : ${tours}">
                        <td class="id-cell" th:text="'#' + ${tour.maTour ?: (currentPage - 1) * 10 + iterStat.index + 1}"></td>
                        <td>
                            <img th:if="${tour.imageUrl}" th:src="${tour.imageUrl}" class="thumbnail-img">
                            <div th:unless="${tour.imageUrl}" class="thumbnail-img bg-secondary d-flex align-items-center justify-content-center"><i class="bi bi-image"></i></div>
                        </td>
                        <td class="tour-title" th:text="${tour.title}"></td>
                        <td class="duration-cell"><i class="bi bi-calendar3"></i> <span th:text="${tour.duration}"></span></td>
                        <td class="price-cell" th:text="${#numbers.formatDecimal(tour.price ?: 0, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td>
                            <span th:if="${tour.trang_thai == 'active' || tour.trang_thai == null}" class="badge badge-status status-confirmed">Đang hiển thị</span>
                            <span th:unless="${tour.trang_thai == 'active' || tour.trang_thai == null}" class="badge badge-status status-cancelled">Đang ẩn</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/admin/tours/toggle-status/{id}(id=${tour.id})}" class="btn-action"><i class="bi bi-gear"></i></a>
                            <a th:href="@{/admin/tours/edit/{id}(id=${tour.id})}" class="btn-action"><i class="bi bi-pencil"></i></a>
                            <a th:href="@{/admin/tours/delete/{id}(id=${tour.id})}" class="btn-action" onclick="return confirm('Xóa tour?')"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tours)}">
                        <td colspan="7" class="text-center py-4 text-muted">Không tìm thấy tour nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container" th:if="${totalPages > 0}">
            <div class="pagination-info">
                Hiển thị <span th:text="${tours.size()}">0</span> / <span th:text="${totalFiltered}">0</span> tour
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/tours(page=${currentPage - 1}, search=${search}, sort=${sort})}" aria-label="Previous">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:text="${i}" th:href="@{/admin/tours(page=${i}, search=${search}, sort=${sort})}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/tours(page=${currentPage + 1}, search=${search}, sort=${sort})}" aria-label="Next">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    <script th:src="@{/js/admin-common.js}"></script>
</body>
</html>
