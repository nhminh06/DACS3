<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý Người dùng - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        .pagination-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding: 15px; background: #26263b; border-radius: 8px; }
        .pagination-info { color: #ccc; font-size: 14px; }
        .pagination .page-link { background: #1e1e2f; border-color: #3f3f5f; color: #fff; padding: 8px 16px; }
        .pagination .page-item.active .page-link { background: #667eea; border-color: #667eea; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

    <div class="main">
        <header class="header mb-4">
            <h1 class="h4 mb-0">Quản lý Người dùng</h1>
            <div class="user-info">
                Xin chào <strong th:text="${session.adminUser.name}">Admin</strong>
            </div>
        </header>

        <!-- Thông báo -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Statistics -->
        <div class="stats-cards">
            <div class="stat-card"><h3 th:text="${total}">0</h3><p>Tổng người dùng</p></div>
            <div class="stat-card"><h3 th:text="${adminCount}">0</h3><p>Quản trị viên</p></div>
            <div class="stat-card"><h3 th:text="${guideCount}">0</h3><p>Hướng dẫn viên</p></div>
            <div class="stat-card"><h3 th:text="${activeCount}">0</h3><p>Đang hoạt động</p></div>
        </div>

        <!-- Search & Filter -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <form action="/admin/users" method="GET" class="search-filter mb-0" style="flex: 1;">
                <input type="text" name="search" placeholder="Tìm kiếm tên, email, sdt..." th:value="${search}" style="flex: 1;">
                <select name="role" onchange="this.form.submit()" class="filter-select">
                    <option value="">Tất cả vai trò</option>
                    <option value="admin" th:selected="${roleFilter == 'admin'}">Admin</option>
                    <option value="guide" th:selected="${roleFilter == 'guide'}">Guide</option>
                    <option value="user" th:selected="${roleFilter == 'user'}">User</option>
                </select>
            </form>
            <a th:href="@{/admin/users/add}" class="btn btn-primary ms-3">
                <i class="bi bi-person-plus-fill me-2"></i> Thêm người dùng
            </a>
        </div>

        <!-- Table -->
        <div class="table-container shadow-sm">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>HỌ TÊN</th><th>EMAIL</th><th>SỐ ĐIỆN THOẠI</th><th>VAI TRÒ</th><th>TRẠNG THÁI</th><th class="text-end">THAO TÁC</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="'#' + ${user.id.substring(0,4).toUpperCase()}"></td>
                        <td class="fw-bold" th:text="${user.get('name')}"></td>
                        <td th:text="${user.get('email')}"></td>
                        <td th:text="${user.get('sdt') ?: 'N/A'}"></td>
                        <td>
                            <span th:if="${user.get('role') == 'admin'}" class="badge bg-danger">Admin</span>
                            <span th:if="${user.get('role') == 'guide'}" class="badge bg-info">Guide</span>
                            <span th:unless="${user.get('role') == 'admin' || user.get('role') == 'guide'}" class="badge bg-secondary">User</span>
                        </td>
                        <td>
                            <span th:if="${user.get('trang_thai') == 'active'}" class="text-success">Hoạt động</span>
                            <span th:unless="${user.get('trang_thai') == 'active'}" class="text-danger">Đã khóa</span>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-warning" title="Phân quyền" th:data-id="${user.id}" onclick="openRoleModal(this.getAttribute('data-id'))">
                                <i class="bi bi-shield-lock"></i>
                            </button>
                            <a th:href="@{/admin/users/toggle-status/{id}(id=${user.id})}" class="btn btn-sm btn-outline-info">
                                <i th:class="${user.get('trang_thai') == 'active' ? 'bi bi-lock' : 'bi bi-unlock'}"></i>
                            </a>
                            <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa người dùng này?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Phân quyền -->
    <div class="modal fade" id="roleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <form action="/admin/users/change-role" method="POST">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">Thay đổi quyền hạn</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="modalUserId">
                        <div class="mb-3">
                            <label class="form-label">Chọn vai trò mới:</label>
                            <select name="role" class="form-select bg-secondary text-white border-0">
                                <option value="user">User</option>
                                <option value="guide">Guide</option>
                                <!-- Chỉ hiện option Admin nếu người đang dùng là Admin Cấp Cao -->
                                <option th:if="${currentAdminLevel == 1}" value="admin">Admin</option>
                            </select>
                        </div>
                        <p th:if="${currentAdminLevel != 1}" class="text-warning small">
                            * Bạn chỉ có quyền phân vai trò User hoặc Guide.
                        </p>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openRoleModal(userId) {
            document.getElementById('modalUserId').value = userId;
            new bootstrap.Modal(document.getElementById('roleModal')).show();
        }
    </script>
</body>
</html>
