<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thêm bài viết mới - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        .form-container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #3b82f6;
            display: flex;
            align-items: center;
        }
        .section-title i { margin-right: 10px; }

        .muc-section {
            background: rgba(255,255,255,0.03);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }
        .muc-section:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .muc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }
        .muc-header h6 { margin-bottom: 0; font-weight: 600; color: #f1f5f9; }

        .btn-remove-muc {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-remove-muc:hover {
            background: #ef4444;
            color: white;
        }

        .btn-add-muc {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px dashed #10b981;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 30px;
            transition: all 0.2s;
        }
        .btn-add-muc:hover {
            background: rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-submit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 35px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        .btn-submit:hover { background: #2563eb; }

        .btn-cancel {
            background: #334155;
            color: #f1f5f9;
            border: none;
            padding: 10px 35px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
        }
        .btn-cancel:hover { background: #475569; color: white; }

        .form-label { color: #94a3b8; font-weight: 500; font-size: 13px; margin-bottom: 8px; }
        .form-control, .form-select {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 10px 15px;
        }
        .form-control:focus, .form-select:focus {
            background: #0f172a;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .help-text { font-size: 11px; color: #64748b; margin-top: 6px; display: block; }
        .required::after { content: " *"; color: #ef4444; }

        input[type="file"]::-webkit-file-upload-button {
            background: #334155;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('articles')}"></div>

    <div class="main">
        <header class="header">
            <h1 class="h4 mb-0">Quản lý bài viết</h1>
            <div class="user-info">
                Xin chào <strong>Admin</strong>
                <a href="/admin/articles" class="btn-back">Quay lại</a>
            </div>
        </header>

        <div class="form-container shadow-lg">
            <form id="articleForm" action="/admin/articles/save" method="POST" enctype="multipart/form-data">

                <div class="section-title"><i class="bi bi-info-circle-fill"></i> Thông tin cơ bản</div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Tour liên quan</label>
                        <select name="tour_id" class="form-select">
                            <option value="0">-- Không liên kết tour --</option>
                            <option th:each="tour : ${tours}" th:value="${tour.id}" th:text="${tour.get('title')}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label required">Loại bài viết</label>
                        <select name="loai_id" class="form-select" required>
                            <option value="">-- Chọn loại --</option>
                            <option value="1">Làng nghề</option>
                            <option value="2">Ẩm thực</option>
                            <option value="3">Văn hóa</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label required">Tiêu đề bài viết</label>
                    <input type="text" name="tieu_de" class="form-control" placeholder="Nhập tiêu đề chính của bài viết" required>
                </div>

                <div class="section-title"><i class="bi bi-layout-text-sidebar-reverse"></i> Nội dung chi tiết</div>

                <div id="mucContainer">
                    <div class="muc-section" data-muc="1">
                        <div class="muc-header">
                            <h6><i class="bi bi-bookmark-fill me-2 text-primary"></i>Mục 1</h6>
                            <button type="button" class="btn-remove-muc" onclick="removeMuc(this)">
                                <i class="bi bi-trash3-fill me-1"></i> Xóa mục
                            </button>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tiêu đề mục</label>
                            <input type="text" name="tieu_de_muc[]" class="form-control" placeholder="Nhập tiêu đề nhỏ cho đoạn này (có thể để trống)">
                        </div>

                        <div class="mb-3">
                            <label class="form-label required">Nội dung văn bản</label>
                            <textarea name="noi_dung_muc[]" class="form-control" rows="5" placeholder="Viết nội dung chi tiết tại đây..." required></textarea>
                        </div>

                        <div class="mb-0">
                            <label class="form-label">Hình ảnh minh họa</label>
                            <input type="file" name="hinh_anh_muc[]" class="form-control" accept="image/*">
                            <span class="help-text">Ảnh sẽ được hiển thị ngay bên dưới nội dung mục này</span>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-add-muc" onclick="addMuc()">
                    <i class="bi bi-plus-lg me-2"></i>Thêm đoạn nội dung mới
                </button>

                <div class="form-actions">
                    <a href="/admin/articles" class="btn-cancel text-center d-flex align-items-center">Hủy bỏ</a>
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-cloud-arrow-up-fill me-2"></i>Lưu và Xuất bản
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let mucCount = 1;
        function addMuc() {
            mucCount++;
            const container = document.getElementById('mucContainer');
            const html = `
                <div class="muc-section" data-muc="${mucCount}">
                    <div class="muc-header">
                        <h6><i class="bi bi-bookmark-fill me-2 text-primary"></i>Mục ${mucCount}</h6>
                        <button type="button" class="btn-remove-muc" onclick="removeMuc(this)">
                            <i class="bi bi-trash3-fill me-1"></i> Xóa mục
                        </button>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề mục</label>
                        <input type="text" name="tieu_de_muc[]" class="form-control" placeholder="Nhập tiêu đề mục">
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Nội dung văn bản</label>
                        <textarea name="noi_dung_muc[]" class="form-control" rows="5" placeholder="Nhập nội dung..." required></textarea>
                    </div>
                    <div class="mb-0">
                        <label class="form-label">Hình ảnh minh họa</label>
                        <input type="file" name="hinh_anh_muc[]" class="form-control" accept="image/*">
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        function removeMuc(btn) {
            const sections = document.querySelectorAll('.muc-section');
            if (sections.length > 1) {
                if (confirm('Bạn có chắc chắn muốn xóa mục nội dung này?')) {
                    const section = btn.closest('.muc-section');
                    section.style.opacity = '0';
                    section.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        section.remove();
                        updateLabels();
                    }, 200);
                }
            } else {
                alert('Bài viết phải có ít nhất một mục nội dung!');
            }
        }
        function updateLabels() {
            const sections = document.querySelectorAll('.muc-section');
            sections.forEach((s, i) => {
                s.querySelector('h6').innerHTML = `<i class="bi bi-bookmark-fill me-2 text-primary"></i>Mục ${i + 1}`;
                s.setAttribute('data-muc', i + 1);
            });
            mucCount = sections.length;
        }
        document.getElementById('articleForm').onsubmit = function() {
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang lưu...';
            btn.disabled = true;
            return true;
        };
    </script>
</body>
</html>
