<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${article != null ? 'Sửa bài viết' : 'Thêm bài viết mới'} + ' - WIND Admin'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        body { background-color: #0f172a !important; color: #f1f5f9 !important; }
        .main { background-color: #0f172a !important; }
        .header { background: #1e293b !important; border-bottom: 1px solid #334155 !important; padding: 15px 25px; margin: -25px -25px 30px -25px; }
        .header h1 { color: #f1f5f9 !important; }

        .form-container { background: #1e293b !important; padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #334155 !important; color: #f1f5f9 !important; }
        .section-title { font-size: 18px; font-weight: 600; margin: 25px 0 15px; padding-bottom: 10px; border-bottom: 1px solid #334155 !important; color: #3b82f6 !important; display: flex; align-items: center; }
        .section-title i { margin-right: 10px; }

        .muc-section { background: #0f172a !important; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #334155 !important; }
        .muc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px dashed #334155 !important; }
        .muc-header h6 { margin-bottom: 0; font-weight: 600; color: #f1f5f9 !important; }

        .form-label { color: #94a3b8 !important; font-weight: 500; font-size: 13px; margin-bottom: 8px; }
        .form-control, .form-select { background-color: #0f172a !important; border: 1px solid #334155 !important; color: #f1f5f9 !important; padding: 10px 15px; }
        .form-control:focus, .form-select:focus { background-color: #0f172a !important; border-color: #3b82f6 !important; color: #ffffff !important; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important; }

        /* Style cho nút trong form */
        .btn-custom { padding: 10px 30px; border-radius: 8px; font-weight: 600; transition: 0.2s; border: none; text-decoration: none !important; display: inline-flex; align-items: center; justify-content: center; }
        .btn-submit { background-color: #3b82f6 !important; color: white !important; }
        .btn-cancel { background-color: #475569 !important; color: white !important; margin-right: 10px; }
        .btn-custom:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-add-muc { background: rgba(16, 185, 129, 0.1) !important; color: #10b981 !important; border: 1px dashed #10b981 !important; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; margin-bottom: 30px; cursor: pointer; }
        .btn-remove-muc { background: rgba(239, 68, 68, 0.1) !important; color: #ef4444 !important; border: 1px solid #ef4444 !important; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

        .img-preview { width: 120px; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('articles')}"></div>

    <div class="main">
        <header class="header">
            <h1 class="h4 mb-0" th:text="${article != null ? 'Chỉnh sửa bài viết' : 'Thêm bài viết mới'}">Quản lý bài viết</h1>
            <div class="user-info">
                Xin chào <strong>Admin</strong>
                <a href="/admin/articles" class="btn btn-warning btn-sm ms-3 text-dark fw-bold"><i class="bi bi-arrow-left"></i> Quay lại</a>
            </div>
        </header>

        <div class="form-container shadow-lg">
            <form id="articleForm" action="/admin/articles/save" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="id" th:value="${article != null ? article['id'] : ''}">

                <div class="section-title"><i class="bi bi-info-circle-fill"></i> Thông tin cơ bản</div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Tour liên quan</label>
                        <select name="tour_id" class="form-select">
                            <option value="0">-- Không liên kết tour --</option>
                            <option th:each="tour : ${tours}" th:value="${tour['id']}" th:text="${tour['title']}"
                                    th:selected="${article != null && article['tour_id'] == tour['id']}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label required">Loại bài viết</label>
                        <select name="loai_id" class="form-select" required>
                            <option value="">-- Chọn loại --</option>
                            <option value="1" th:selected="${article != null && #strings.toString(article['loai_id']) == '1'}">Làng nghề</option>
                            <option value="2" th:selected="${article != null && #strings.toString(article['loai_id']) == '2'}">Ẩm thực</option>
                            <option value="3" th:selected="${article != null && #strings.toString(article['loai_id']) == '3'}">Văn hóa</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tác giả / Nguồn</label>
                        <input type="text" name="tac_gia" class="form-control" th:value="${article != null ? article['tac_gia'] : 'Admin'}">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label required">Tiêu đề bài viết</label>
                    <input type="text" name="tieu_de" class="form-control" required th:value="${article != null ? article['tieu_de'] : ''}">
                </div>

                <div class="section-title"><i class="bi bi-layout-text-sidebar-reverse"></i> Nội dung chi tiết</div>

                <div id="mucContainer">
                    <div th:if="${article == null}" class="muc-section" data-muc="1">
                        <div class="muc-header">
                            <h6><i class="bi bi-bookmark-fill me-2 text-primary"></i>Mục 1</h6>
                            <button type="button" class="btn-remove-muc" onclick="removeMuc(this)">Xóa mục</button>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tiêu đề mục</label>
                            <input type="text" name="tieu_de_muc[]" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label required">Nội dung văn bản</label>
                            <textarea name="noi_dung_muc[]" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">Hình ảnh minh họa</label>
                            <input type="file" name="hinh_anh_muc[]" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <th:block th:if="${article != null}">
                        <div th:each="muc, iter : ${article['sections']}" class="muc-section" th:data-muc="${iter.index + 1}">
                            <div class="muc-header">
                                <h6 th:utext="'<i class=\'bi bi-bookmark-fill me-2 text-primary\'></i>Mục ' + ${iter.index + 1}"></h6>
                                <button type="button" class="btn-remove-muc" onclick="removeMuc(this)">Xóa mục</button>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tiêu đề mục</label>
                                <input type="text" name="tieu_de_muc[]" class="form-control" th:value="${muc['tieu_de']}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required">Nội dung văn bản</label>
                                <textarea name="noi_dung_muc[]" class="form-control" rows="5" required th:text="${muc['noi_dung']}"></textarea>
                            </div>
                            <div class="mb-0">
                                <label class="form-label">Hình ảnh minh họa</label>
                                <input type="file" name="hinh_anh_muc[]" class="form-control" accept="image/*">
                                <input type="hidden" name="hinh_anh_cu[]" th:value="${muc['hinh_anh']}">
                                <img th:if="${muc['hinh_anh'] != null && !#strings.isEmpty(muc['hinh_anh'])}" th:src="${muc['hinh_anh']}" class="img-preview">
                            </div>
                        </div>
                    </th:block>
                </div>

                <button type="button" class="btn-add-muc" onclick="addMuc()">+ Thêm đoạn nội dung mới</button>

                <div class="d-flex justify-content-end mt-4">
                    <a href="/admin/articles" class="btn-custom btn-cancel">Hủy bỏ</a>
                    <button type="submit" class="btn-custom btn-submit">Lưu bài viết</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        let mucCount = [[${article != null && article['sections'] != null ? article['sections'].size() : 1}]];
        function addMuc() {
            mucCount++;
            const html = `
                <div class="muc-section" data-muc="${mucCount}">
                    <div class="muc-header">
                        <h6><i class="bi bi-bookmark-fill me-2 text-primary"></i>Mục ${mucCount}</h6>
                        <button type="button" class="btn-remove-muc" onclick="removeMuc(this)">Xóa mục</button>
                    </div>
                    <div class="mb-3"><label class="form-label">Tiêu đề mục</label><input type="text" name="tieu_de_muc[]" class="form-control"></div>
                    <div class="mb-3"><label class="form-label required">Nội dung văn bản</label><textarea name="noi_dung_muc[]" class="form-control" rows="5" required></textarea></div>
                    <div class="mb-0"><label class="form-label">Hình ảnh minh họa</label><input type="file" name="hinh_anh_muc[]" class="form-control" accept="image/*"></div>
                </div>`;
            document.getElementById('mucContainer').insertAdjacentHTML('beforeend', html);
        }
        function removeMuc(btn) {
            if (document.querySelectorAll('.muc-section').length > 1) {
                btn.closest('.muc-section').remove();
                updateLabels();
            } else alert('Phải có ít nhất một mục nội dung!');
        }
        function updateLabels() {
            document.querySelectorAll('.muc-section').forEach((s, i) => {
                s.querySelector('h6').innerHTML = `<i class="bi bi-bookmark-fill me-2 text-primary"></i>Mục ${i + 1}`;
                s.setAttribute('data-muc', i + 1);
            });
            mucCount = document.querySelectorAll('.muc-section').length;
        }
    </script>
</body>
</html>
