<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bài viết - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        body { background-color: #0f172a !important; color: #f1f5f9 !important; }
        .main { background-color: #0f172a !important; }
        .header { background: #1e293b !important; border-bottom: 1px solid #334155 !important; padding: 15px 25px; margin: -25px -25px 30px -25px; }
        .header h1 { color: #f1f5f9 !important; }

        .stats-row .card { background-color: #1e293b !important; border: 1px solid #334155 !important; color: #f1f5f9 !important; }

        .table-custom { background: #1e293b !important; border: 1px solid #334155 !important; color: #f1f5f9 !important; width: 100%; border-radius: 12px; overflow: hidden; }
        .table-custom thead th { background: #1e3a8a !important; color: #cbd5e1 !important; border-bottom: 2px solid #0f172a !important; padding: 15px; font-size: 12px; text-transform: uppercase; }
        .table-custom tbody td { background: #1e293b !important; border-bottom: 1px solid #334155 !important; padding: 15px; vertical-align: middle; }
        .table-custom tbody tr:hover td { background: #233149 !important; }

        .form-control, .form-select {
            background-color: #1e293b !important;
            border: 1px solid #334155 !important;
            color: #f1f5f9 !important;
        }
        .form-control::placeholder { color: #475569 !important; }

        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            border: none;
        }
        .btn-view { background-color: #6366f1 !important; color: white !important; }
        .btn-edit { background-color: #475569 !important; color: white !important; }
        .btn-approve { background-color: #10b981 !important; color: white !important; }
        .btn-hide { background-color: #f59e0b !important; color: white !important; }
        .btn-delete { background-color: #ef4444 !important; color: white !important; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

        .article-img { width: 80px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #334155; }
        .badge-category { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .cat-1 { background: #7c2d12 !important; color: #ffedd5 !important; }
        .cat-2 { background: #064e3b !important; color: #d1fae5 !important; }
        .cat-3 { background: #1e3a8a !important; color: #dbeafe !important; }

        .status-pill { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-active { background: #10b981; }
        .status-pending { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }

        /* Pagination Styling */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .pagination-info { color: #94a3b8; font-size: 14px; }
        .pagination .page-link {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
            padding: 8px 16px;
            border-radius: 6px;
            margin: 0 3px;
        }
        .pagination .page-item.active .page-link {
            background: #2563eb;
            border-color: #2563eb;
        }
        .pagination .page-item.disabled .page-link {
            background: #1e293b;
            color: #475569;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('articles')}"></div>
    <div class="main">
        <header class="header mb-4 d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">Quản lý Bài viết & Di sản</h1>
            <a href="/admin/articles/add" class="btn btn-primary"><i class="bi bi-plus-lg me-2"></i>Thêm bài viết mới</a>
        </header>

        <div class="stats-row mb-4 row g-3">
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <div class="small text-secondary">Tổng số bài viết</div>
                    <div class="h3 mb-0 text-white" th:text="${total}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <div class="small text-secondary">Văn hóa & Di sản</div>
                    <div class="h3 mb-0 text-info" th:text="${vanHoaCount}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <div class="small text-secondary">Ẩm thực đặc sắc</div>
                    <div class="h3 mb-0 text-success" th:text="${amThucCount}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <div class="small text-secondary">Tinh hoa làng nghề</div>
                    <div class="h3 mb-0 text-warning" th:text="${langNheCount}">0</div>
                </div>
            </div>
        </div>

        <!-- BỘ LỌC TÌM KIẾM -->
        <div class="filters-row mb-4 d-flex gap-2">
            <form action="/admin/articles" method="GET" class="d-flex gap-2 flex-grow-1">
                <input type="text" name="search" th:value="${search}" class="form-control" style="width: 300px;" placeholder="Tìm tiêu đề bài viết...">
                <select name="loai" class="form-select" style="width: 180px;">
                    <option value="0">Tất cả danh mục</option>
                    <option value="3" th:selected="${loai == 3}">Văn hóa</option>
                    <option value="2" th:selected="${loai == 2}">Ẩm thực</option>
                    <option value="1" th:selected="${loai == 1}">Làng nghề</option>
                </select>
                <button type="submit" class="btn btn-secondary px-3"><i class="bi bi-filter"></i> Lọc</button>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th style="width: 80px;">Ảnh</th>
                        <th>Tiêu đề & Danh mục</th>
                        <th style="width: 150px;">Nguồn / Tác giả</th>
                        <th style="width: 120px;">Ngày tạo</th>
                        <th style="width: 130px;">Trạng thái</th>
                        <th style="width: 220px; text-align: center;">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="article : ${articles}">
                        <td>
                            <img th:if="${article['sections'] != null && !#lists.isEmpty(article['sections'])}"
                                 th:src="${article['sections'][0]['hinh_anh']}" class="article-img">
                        </td>
                        <td>
                            <div class="fw-bold mb-1" th:text="${article['tieu_de']}">Tiêu đề</div>
                            <span th:if="${#strings.toString(article['loai_id']) == '1'}" class="badge-category cat-1">Làng nghề</span>
                            <span th:if="${#strings.toString(article['loai_id']) == '2'}" class="badge-category cat-2">Ẩm thực</span>
                            <span th:if="${#strings.toString(article['loai_id']) == '3'}" class="badge-category cat-3">Văn hóa</span>
                        </td>
                        <td>
                            <div class="mb-1">
                                <span th:class="${article['nguon_goc'] == 'user' ? 'badge bg-primary' : 'badge bg-secondary'}"
                                      th:text="${article['nguon_goc'] == 'user' ? 'Người dùng' : 'Admin'}" style="font-size: 10px;"></span>
                            </div>
                            <div class="small text-secondary" th:text="${article['tac_gia'] ?: 'Hệ thống'}">Tác giả</div>
                        </td>
                        <td class="small" th:text="${article['ngay_tao']}">Ngày tạo</td>
                        <td>
                            <div th:if="${#strings.toString(article['trang_thai']) == '1'}">
                                <span class="status-pill status-active"></span>Công khai
                            </div>
                            <div th:if="${#strings.toString(article['trang_thai']) != '1'}">
                                <span class="status-pill status-pending"></span>Chờ duyệt
                            </div>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-1">
                                <a th:href="@{/admin/articles/view/{id}(id=${article['id']})}" class="btn-action btn-view" title="Xem">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <a th:if="${#strings.toString(article['trang_thai']) != '1'}"
                                   th:href="@{/admin/articles/toggle-status/{id}(id=${article['id']})}" class="btn-action btn-approve" title="Duyệt">
                                    <i class="bi bi-check-circle"></i>
                                </a>

                                <a th:if="${#strings.toString(article['trang_thai']) == '1'}"
                                   th:href="@{/admin/articles/toggle-status/{id}(id=${article['id']})}" class="btn-action btn-hide" title="Ẩn bài viết">
                                    <i class="bi bi-eye-slash"></i>
                                </a>

                                <a th:href="@{/admin/articles/edit/{id}(id=${article['id']})}" class="btn-action btn-edit" title="Sửa">
                                    <i class="bi bi-pencil-square"></i>
                                </a>

                                <a th:href="@{/admin/articles/delete/{id}(id=${article['id']})}" class="btn-action btn-delete"
                                   onclick="return confirm('Xóa bài này?')" title="Xóa">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination Section -->
        <div class="pagination-container" th:if="${totalPages > 1}">
            <div class="pagination-info">
                Hiển thị <span th:text="${articles.size()}">0</span> / <span th:text="${totalFiltered}">0</span> bài viết
            </div>
            <nav>
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/articles(page=${currentPage - 1}, search=${search}, loai=${loai}, sort=${sort})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:text="${i}" th:href="@{/admin/articles(page=${i}, search=${search}, loai=${loai}, sort=${sort})}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/articles(page=${currentPage + 1}, search=${search}, loai=${loai}, sort=${sort})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</body>
</html>
