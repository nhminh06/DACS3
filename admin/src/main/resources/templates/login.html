<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập Admin - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                              url('https://res.cloudinary.com/dsh6wv90k/image/upload/q_auto/f_auto/v1775268296/background-xanh-1_py6v8h.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-login {
            width: 75px;
            height: 75px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid white;
        }
        .login-header h1 {
            color: #1e40af;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .login-header p {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }
        .form-label {
            color: #475569;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            margin-bottom: 5px;
            transition: all 0.3s;
            background: #f8fafc;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            border-color: #3b82f6;
            background: white;
        }
        .btn-login {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            transition: 0.3s;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
        }
        .alert {
            border-radius: 12px;
            font-size: 14px;
            padding: 12px 18px;
            margin-bottom: 25px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="https://res.cloudinary.com/dsh6wv90k/image/upload/q_auto/f_auto/v1775268368/d00a2d73-46f1-4689-845a-e075340a6c42_dfjlav.png" class="logo-login" alt="Logo">
            <h1>WIND ADMIN</h1>
            <p>Hệ thống quản lý du lịch thông minh</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase">Email Quản trị</label>
                <input type="email" name="email" class="form-control" placeholder="admin@windtravel.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">ĐĂNG NHẬP NGAY</button>
        </form>
    </div>
</body>
</html>
