<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bảng điều khiển - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        .welcome-section {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            color: white;
        }
        .welcome-section h2 { font-weight: 700; margin-bottom: 10px; }
        .welcome-section p { opacity: 0.9; font-size: 16px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .stat-card-dash {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            background: white;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            color: #1e293b;
        }
        .stat-card-dash:hover { transform: translateY(-5px); }
        .stat-card-dash i.card-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            color: rgba(59, 130, 246, 0.1);
        }
        .stat-card-dash h3 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }
        .stat-card-dash p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('stats')}"></div>

    <div class="main">
        <header class="header">
            <h1 class="h4 mb-0">Hệ thống Quản trị</h1>
            <div class="user-info">
                Xin chào <strong>Admin</strong>
                <button class="btn-back" style="background: #475569;">Cài đặt</button>
            </div>
        </header>

        <div class="welcome-section">
            <h2>Chào mừng quay trở lại, Admin!</h2>
            <p>Hệ thống đang hoạt động ổn định. Chúc bạn một ngày làm việc hiệu quả.</p>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card-dash">
                <div>
                    <h3 th:text="${totalUsers}">0</h3>
                    <p>Người dùng hệ thống</p>
                </div>
                <i class="bi bi-people card-icon"></i>
            </div>

            <div class="stat-card-dash">
                <div>
                    <h3 th:text="${totalTours}">0</h3>
                    <p>Tour đang hoạt động</p>
                </div>
                <i class="bi bi-map card-icon"></i>
            </div>

            <div class="stat-card-dash">
                <div>
                    <h3 th:text="${totalBookings}">0</h3>
                    <p>Đơn đặt Tour mới</p>
                </div>
                <i class="bi bi-calendar-check card-icon"></i>
            </div>

            <div class="stat-card-dash">
                <div>
                    <h3>1.2M</h3>
                    <p>Lượt truy cập tháng</p>
                </div>
                <i class="bi bi-graph-up card-icon"></i>
            </div>
        </div>
    </div>
</body>
</html>
