<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi tiết Chuyến Đi - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        body { background-color: #0f172a; color: #cbd5e1; }
        .tour-detail-card { background: #1e3a8a; border-radius: 16px; padding: 25px; margin-bottom: 30px; display: flex; gap: 25px; align-items: center; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .tour-detail-img { width: 140px; height: 100px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats-grid-v3 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card-v3 { background: #111827; border-radius: 12px; padding: 20px 10px; text-align: center; border: 1px solid #1e293b; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .stat-icon-box { display: inline-flex; width: 40px; height: 40px; background: #1e293b; color: #3b82f6; border-radius: 10px; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 10px; }
        .stat-card-v3 .val { font-size: 20px; font-weight: 700; color: #3b82f6; display: block; }
        .stat-card-v3 .lab { font-size: 11px; color: #fff; font-weight: 700; text-transform: uppercase; margin-top: 4px; }
        .booking-card-item { background: #111827; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1e293b; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .bk-item-top { padding: 12px 20px; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .bk-main-id { color: #60a5fa; font-weight: 700; font-family: 'Consolas', monospace; font-size: 14px; }
        .bk-item-content { padding: 20px; display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 25px; }
        .sec-title-v3 { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        .c-info-line { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; font-size: 13px; }
        .c-info-line strong { color: #f1f5f9; }
        .pax-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: #94a3b8; }
        .pax-row strong { color: #e2e8f0; }
        .pax-total { border-top: 1px solid #334155; margin-top: 5px; padding-top: 5px; color: #3b82f6 !important; font-weight: 700; }
        .payment-val { font-size: 20px; font-weight: 800; color: #10b981; }
        .bk-item-btns { padding: 12px 20px; background: #0f172a; display: flex; gap: 10px; }
        .btn-muted-cyan { background: #0e7490; color: #cffafe; border: none; padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; }
        .btn-muted-cyan:hover { background: #155e75; color: white; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('bookings')}"></div>
    <div class="main">
        <header class="header">
            <h1 class="h4 mb-0">Chi tiết Booking Chuyến Đi</h1>
            <div class="user-info">
                Xin chào <strong>minhadmin</strong>
                <a href="/admin/bookings/schedule" class="btn-back">Trở lại</a>
            </div>
        </header>

        <div th:if="${booking != null}" class="tour-detail-card">
            <img th:src="${booking.tour != null ? booking.tour['imageUrl'] : 'https://placehold.co/600x400'}" class="tour-detail-img">
            <div class="tour-detail-info">
                <h2 th:text="${booking.tour != null ? booking.tour['title'] : 'N/A'}"></h2>
                <div class="tour-detail-meta">
                    <span><i class="bi bi-calendar-event me-2"></i>Khởi hành: <strong class="text-info" th:text="${booking.startDate}"></strong></span>
                    <span><i class="bi bi-clock me-2"></i>Thời gian: <strong th:text="${booking.tour != null ? booking.tour['duration'] : 'N/A'}"></strong></span>
                </div>
            </div>
        </div>

        <div class="stats-grid-v3">
            <div class="stat-card-v3">
                <div class="stat-icon-box"><i class="bi bi-journal-text"></i></div>
                <span class="val" th:text="${bookings.size()}">0</span>
                <span class="lab">Booking</span>
            </div>
            <div class="stat-card-v3">
                <div class="stat-icon-box"><i class="bi bi-people"></i></div>
                <span class="val" th:text="${totalPassengers}">0</span>
                <span class="lab">Tổng Khách</span>
            </div>
            <div class="stat-card-v3">
                <div class="stat-icon-box"><i class="bi bi-check-circle"></i></div>
                <span class="val" th:text="${bookings.size()}">0</span>
                <span class="lab">Đã Xác Nhận</span>
            </div>
            <div class="stat-card-v3">
                <div class="stat-icon-box"><i class="bi bi-clock-history"></i></div>
                <span class="val">0</span>
                <span class="lab">Chờ Duyệt</span>
            </div>
            <div class="stat-card-v3">
                <div class="stat-icon-box"><i class="bi bi-cash-stack"></i></div>
                <span class="val" th:text="${#numbers.formatDecimal(totalRevenue / 1000, 0, 'COMMA', 0, 'POINT') + 'k'}"></span>
                <span class="lab">Doanh Thu</span>
            </div>
        </div>

        <h5 class="mb-4 border-start border-info ps-3">Danh sách đoàn chi tiết</h5>

        <div th:each="bk : ${bookings}" class="booking-card-item">
            <div class="bk-item-top">
                <div>
                    <div class="bk-main-id" th:text="${bk.id}"></div>
                    <div class="small text-white" style="font-size: 10px;">Đặt tour ngày: <span th:text="${bk.createdAt != null ? #dates.format(bk.createdAt, 'dd/MM/yyyy') : 'N/A'}"></span></div>
                </div>
                <span class="badge bg-success px-3 py-2" style="font-size: 10px;">XÁC NHẬN</span>
            </div>
            <div class="bk-item-content">
                <div class="info-sec-v3">
                    <div class="sec-title-v3">Khách hàng</div>
                    <div class="c-info-line"><i class="bi bi-person-circle text-info"></i> <strong th:text="${bk.customerName}"></strong></div>
                    <div class="c-info-line"><i class="bi bi-telephone text-info"></i> <span th:text="${bk.phone}"></span></div>
                    <div class="c-info-line"><i class="bi bi-envelope text-info"></i> <span th:text="${bk.email}" class="small"></span></div>
                </div>
                <div class="info-sec-v3">
                    <div class="sec-title-v3">Chi tiết số lượng</div>
                    <div class="pax-row"><span>Người lớn:</span> <strong th:text="${bk.adults ?: 0}"></strong></div>
                    <div class="pax-row"><span>Trẻ em:</span> <strong th:text="${bk.children ?: 0}"></strong></div>
                    <div class="pax-row"><span>Trẻ sơ sinh:</span> <strong th:text="${bk.infants ?: 0}"></strong></div>
                    <div class="pax-row pax-total"><span>Tổng:</span> <strong th:text="${(bk.adults ?: 0) + (bk.children ?: 0) + (bk.infants ?: 0)}"></strong></div>
                </div>
                <div class="info-sec-v3">
                    <div class="sec-title-v3">Thanh toán</div>
                    <div class="payment-val" th:text="${#numbers.formatDecimal(bk.totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}"></div>
                    <div class="mt-2 small text-white italic">
                        <i class="bi bi-info-circle me-1"></i>
                        <span th:text="${bk.paymentMethod == 'QR' ? 'Chuyển khoản QR' : 'Tiền mặt'}"></span>
                    </div>
                </div>
            </div>
            <div class="bk-item-btns">
                <a th:href="@{/admin/bookings/booking-detail/{id}(id=${bk.id})}" class="btn-muted-cyan">
                    <i class="bi bi-gear-fill me-1"></i> Quản lý đơn
                </a>
                <div class="ms-auto small text-white-50 italic">
                    Ghi chú: <span th:text="${bk.note != null && !bk.note.isEmpty() ? bk.note : 'Không có'}"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
