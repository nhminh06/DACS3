<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Điều hành Lịch trình - WIND Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }

        .stats-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card-custom {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .stat-card-custom:hover {
            border-color: #3b82f6;
            transform: translateY(-3px);
        }
        .stat-card-custom .value {
            font-size: 28px;
            font-weight: 800;
            color: #3b82f6;
            margin-bottom: 5px;
        }
        .stat-card-custom .label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card-custom .icon {
            font-size: 24px;
            color: rgba(59, 130, 246, 0.2);
            margin-bottom: 10px;
        }

        .tour-grid-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            height: 100%;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .tour-grid-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .tour-img-container {
            position: relative;
            height: 180px;
        }
        .tour-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tour-badges {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }
        .badge-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-id { background: #3b82f6; color: white; }
        .badge-type { background: #10b981; color: white; }

        .tour-body {
            padding: 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .tour-title {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 45px;
        }

        .tour-info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #94a3b8;
        }
        .info-item { display: flex; align-items: center; gap: 5px; }

        .tour-stats-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .stat-mini-item { text-align: center; }
        .stat-mini-val { display: block; font-weight: 700; color: #f1f5f9; font-size: 14px; }
        .stat-mini-lab { font-size: 10px; color: #64748b; text-transform: uppercase; }

        .tour-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tour-price { color: #3b82f6; font-weight: 800; font-size: 15px; }
        .btn-view-trips {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            transition: 0.2s;
        }
        .tour-grid-card:hover .btn-view-trips {
            background: #3b82f6;
            color: white;
        }

        .filters-container {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }
        .search-wrapper {
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .search-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px 15px 10px 40px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: #3b82f6; }

        .filter-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .filter-select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            color: white;
            outline: none;
            cursor: pointer;
        }
        .filter-select:focus { border-color: #3b82f6; }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('bookings')}"></div>

    <div class="main">
        <header class="header">
            <h1 class="h4 mb-0">Quản lý Lịch trình Tour</h1>
            <div class="user-info">
                Xin chào <strong>minhadmin</strong>
                <a href="/admin/bookings" class="btn-back">Trở lại</a>
            </div>
        </header>

        <div class="stats-grid-container">
            <div class="stat-card-custom">
                <i class="bi bi-map icon"></i>
                <div class="value" th:text="${totalToursCount ?: 0}">0</div>
                <div class="label">Tổng số Tour</div>
            </div>
            <div class="stat-card-custom">
                <i class="bi bi-clock-history icon"></i>
                <div class="value" th:text="${preparingCount ?: 0}">0</div>
                <div class="label">Chuyến chuẩn bị</div>
            </div>
            <div class="stat-card-custom">
                <i class="bi bi-play-circle icon"></i>
                <div class="value" th:text="${startedCount ?: 0}">0</div>
                <div class="label">Đang diễn ra</div>
            </div>
            <div class="stat-card-custom">
                <i class="bi bi-cash-stack icon"></i>
                <div class="value text-success" th:text="${#numbers.formatDecimal(totalRevenue ?: 0, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</div>
                <div class="label">Doanh thu xác nhận</div>
            </div>
        </div>

        <form action="/admin/bookings/schedule" method="GET" class="filters-container">
            <div class="filter-group">
                <label>Tìm kiếm</label>
                <div class="search-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" name="search" class="search-input" placeholder="Tên hoặc mã tour..." th:value="${search}">
                </div>
            </div>

            <div class="filter-group">
                <label>Loại hình</label>
                <select name="type" class="filter-select" onchange="this.form.submit()">
                    <option value="ALL" th:selected="${currentType == 'ALL'}">Tất cả loại hình</option>
                    <option value="DAY_TOUR" th:selected="${currentType == 'DAY_TOUR'}">Tour trong ngày</option>
                    <option value="MULTI_DAY" th:selected="${currentType == 'MULTI_DAY'}">Tour dài ngày</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Lịch trình</label>
                <select name="hasTrips" class="filter-select" onchange="this.form.submit()">
                    <option value="ALL" th:selected="${currentHasTrips == 'ALL'}">Tất cả tour</option>
                    <option value="ACTIVE" th:selected="${currentHasTrips == 'ACTIVE'}">Đang có chuyến</option>
                    <option value="NONE" th:selected="${currentHasTrips == 'NONE'}">Chưa có chuyến</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary px-4 rounded-3 h-50" style="min-height: 42px;">
                <i class="bi bi-funnel-fill me-2"></i>Lọc
            </button>
        </form>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div th:each="tour : ${tours}" class="col">
                <a th:href="@{/admin/bookings/tour-trips/{id}(id=${tour.id})}" class="tour-grid-card">
                    <div class="tour-img-container">
                        <div class="tour-badges">
                            <span class="badge-tag badge-id" th:text="${tour.maTour}">VN001</span>
                            <span class="badge-tag badge-type" th:text="${tour.type == 'DAY_TOUR' ? 'Tour ngày' : 'Dài ngày'}">Tour ngày</span>
                        </div>
                        <img th:src="${tour.imageUrl != null ? tour.imageUrl : 'https://placehold.co/600x400'}" class="tour-img">
                    </div>
                    <div class="tour-body">
                        <h3 class="tour-title" th:text="${tour.title}">Tên Tour du lịch</h3>

                        <div class="tour-info-row">
                            <div class="info-item"><i class="bi bi-geo-alt text-primary"></i> <span th:text="${tour.location}">Đà Nẵng</span></div>
                            <div class="info-item"><i class="bi bi-clock text-primary"></i> <span th:text="${tour.duration}">1 ngày</span></div>
                        </div>

                        <div class="tour-stats-mini">
                            <div class="stat-mini-item">
                                <span class="stat-mini-val" th:text="${tour.activeTrips ?: 0}">0</span>
                                <span class="stat-mini-lab">Chuyến sắp tới</span>
                            </div>
                            <div class="stat-mini-item">
                                <span class="stat-mini-val" th:text="${tour.totalBookings ?: 0}">0</span>
                                <span class="stat-mini-lab">Tổng đơn đặt</span>
                            </div>
                        </div>

                        <div class="tour-footer">
                            <div class="tour-price" th:text="${#numbers.formatDecimal(tour.price ?: 0, 0, 'COMMA', 0, 'POINT') + 'đ'}">1.200.000đ</div>
                            <div class="btn-view-trips">Quản lý các chuyến <i class="bi bi-arrow-right ms-1"></i></div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="pagination-container" th:if="${totalPages > 0}">
            <div class="text-muted small">Trang <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span></div>
            <nav><ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'"><a class="page-link" th:href="@{/admin/bookings/schedule(page=${currentPage - 1}, search=${search}, type=${currentType}, hasTrips=${currentHasTrips})}">&laquo;</a></li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${i == currentPage} ? 'active'"><a class="page-link" th:text="${i}" th:href="@{/admin/bookings/schedule(page=${i}, search=${search}, type=${currentType}, hasTrips=${currentHasTrips})}">1</a></li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'"><a class="page-link" th:href="@{/admin/bookings/schedule(page=${currentPage + 1}, search=${search}, type=${currentType}, hasTrips=${currentHasTrips})}">&raquo;</a></li>
            </ul></nav>
        </div>
    </div>
</body>
</html>
