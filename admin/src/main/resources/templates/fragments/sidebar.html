<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <aside th:fragment="sidebar(activeMenu)" class="sidebar">
        <div class="logo">WIND Admin</div>
        <nav class="nav flex-column">
            <a class="nav-link" th:classappend="${activeMenu == 'admin' ? 'active' : ''}" href="#">
                <i class="bi bi-person-gear"></i> Tài khoản quản trị
            </a>
            <a class="nav-link" th:classappend="${activeMenu == 'tours' ? 'active' : ''}" href="/admin/tours">
                <i class="bi bi-map"></i> Quản lý Tour
            </a>
            <a class="nav-link" th:classappend="${activeMenu == 'bookings' ? 'active' : ''}" href="/admin/bookings">
                <i class="bi bi-calendar-check"></i> Quản lý đặt Tour
            </a>
            <a class="nav-link" th:classappend="${activeMenu == 'articles' ? 'active' : ''}" href="/admin/articles">
                <i class="bi bi-journal-text"></i> Quản lý bài viết
            </a>
            <a class="nav-link" th:classappend="${activeMenu == 'info' ? 'active' : ''}" href="#">
                <i class="bi bi-info-circle"></i> Quản lý thông tin
            </a>
            <a class="nav-link" th:classappend="${activeMenu == 'users' ? 'active' : ''}" href="/admin/users">
                <i class="bi bi-people"></i> Quản lý người dùng
            </a>
            <a class="nav-link" th:classappend="${activeMenu == 'stats' ? 'active' : ''}" href="/admin">
                <i class="bi bi-bar-chart"></i> Thống kê
            </a>
            <a class="nav-link" href="/">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </a>
        </nav>
    </aside>
</body>
</html>
